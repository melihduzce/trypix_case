services:
  - type: web
    name: trypix-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FAL_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DB_PATH
        value: /opt/render/project/src/trypix.db
    disk:
      name: trypix-db
      mountPath: /opt/render/project/src
      sizeGB: 1
